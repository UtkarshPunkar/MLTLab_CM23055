<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Pose Detection</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1f1c2c,#928dab);
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

/* HEADER */
.header{
width:100%;
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,0.4);
}

/* STATUS */
.statusBox{
margin-top:15px;
background:rgba(255,255,255,0.1);
padding:10px 20px;
border-radius:10px;
}

.status{
color:#00ffcc;
font-weight:bold;
}

/* VIDEO CONTAINER FIXED */
.video-container{
position:relative;
margin-top:20px;
width:640px;      /* IMPORTANT FIX */
height:480px;     /* IMPORTANT FIX */
border-radius:12px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,0,0,0.6);
background:black;
}

/* VIDEO + CANVAS */
video, canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
transform:scaleX(-1);
}

canvas{
z-index:10;
}

</style>
</head>

<body>

<div class="header">AI Pose Detection</div>

<div class="statusBox">
Status: <span id="status" class="status">Loading...</span>
</div>

<div class="video-container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
</div>

<script>

const video = document.getElementById('webcam');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusText = document.getElementById('status');

// SETUP CAMERA
async function setupCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject = stream;

return new Promise(resolve=>{
video.onloadedmetadata = ()=>{
video.play();
video.style.display = "block"; // FIX
resolve(video);
};
});

}

// MAIN
async function main(){

try{

statusText.innerText="Loading Model...";

// LOAD MODEL
const net = await posenet.load({
architecture:'MobileNetV1',
outputStride:16,
inputResolution:{width:257,height:257},
multiplier:0.5
});

statusText.innerText="Starting Camera...";

// START CAMERA
const vid = await setupCamera();

statusText.innerText="Tracking Active";

// LOOP
async function detectPose(){

// SYNC SIZE (IMPORTANT)
canvas.width = vid.videoWidth;
canvas.height = vid.videoHeight;

const pose = await net.estimateSinglePose(vid,{
flipHorizontal:true
});

ctx.clearRect(0,0,canvas.width,canvas.height);

// DRAW KEYPOINTS
pose.keypoints.forEach(k=>{
if(k.score>0.3){
ctx.beginPath();
ctx.arc(k.position.x,k.position.y,6,0,2*Math.PI);
ctx.fillStyle="#00ffcc";
ctx.fill();
}
});

// DRAW SKELETON
const adj = posenet.getAdjacentKeyPoints(pose.keypoints,0.3);

adj.forEach(p=>{
ctx.beginPath();
ctx.moveTo(p[0].position.x,p[0].position.y);
ctx.lineTo(p[1].position.x,p[1].position.y);
ctx.strokeStyle="#ff00ff";
ctx.lineWidth=2;
ctx.stroke();
});

requestAnimationFrame(detectPose);
}

detectPose();

}catch(err){
console.error(err);
statusText.innerText="Camera Error!";
}

}

// START
main();

</script>

</body>
</html>
