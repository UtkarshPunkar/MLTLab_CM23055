<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<title>Sentiment Analysis Trainer</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>

body{
font-family: Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:700px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#333;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 18px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:disabled{
background:gray;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

.log-box{
background:#1e1e1e;
color:#00ff9c;
padding:10px;
height:180px;
overflow-y:auto;
font-family:monospace;
border-radius:5px;
margin-top:10px;
}

.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Sentiment Analysis Trainer</h1>

<button id="trainBtn">Train Model</button>

<p id="status">Status: Ready</p>

<h3>Training Logs</h3>
<div id="log" class="log-box"></div>

<hr>

<h3>Test Sentiment</h3>

<input id="sentenceInput" placeholder="Type a sentence...">

<button id="predictBtn">Predict Sentiment</button>

<div id="result" class="result"></div>

</div>

<script>

// Dataset
const data = [

{ text:"i love this product", label:1 },
{ text:"this is amazing and great", label:1 },
{ text:"excellent work and very happy", label:1 },
{ text:"great experience highly recommend", label:1 },
{ text:"fantastic and wonderful", label:1 },

{ text:"i hate this so much", label:0 },
{ text:"this is terrible and bad", label:0 },
{ text:"worst experience ever", label:0 },
{ text:"very disappointed with this", label:0 },
{ text:"poor quality and awful", label:0 }

];

// Vocabulary
const words = Array.from(new Set(data.flatMap(d=>d.text.split(" "))));

const vocab = Object.fromEntries(words.map((w,i)=>[w,i+1]));

const vocabSize = words.length+1;

const maxLen = 5;


// Encoding
function encode(text){

let tokens = text.toLowerCase().split(" ").map(w=>vocab[w] || 0);

if(tokens.length < maxLen){
tokens = [...tokens,...Array(maxLen-tokens.length).fill(0)];
}

else{
tokens = tokens.slice(0,maxLen);
}

return tokens;

}


// Tensors
const xs = tf.tensor2d(data.map(d=>encode(d.text)));

const ys = tf.tensor2d(data.map(d=>[d.label]));


// Model
const model = tf.sequential();

model.add(tf.layers.embedding({
inputDim:vocabSize,
outputDim:8,
inputLength:maxLen
}));

model.add(tf.layers.flatten());

model.add(tf.layers.dense({
units:1,
activation:"sigmoid"
}));

model.compile({
optimizer:"adam",
loss:"binaryCrossentropy",
metrics:["accuracy"]
});


// UI elements
const logBox = document.getElementById("log");

const status = document.getElementById("status");

const trainBtn = document.getElementById("trainBtn");

const predictBtn = document.getElementById("predictBtn");

const input = document.getElementById("sentenceInput");

const result = document.getElementById("result");


// Training
trainBtn.onclick = async ()=>{

trainBtn.disabled = true;

status.innerText = "Training Model...";

await model.fit(xs,ys,{

epochs:40,

callbacks:{

onEpochEnd:(epoch,logs)=>{

const acc = logs.acc || logs.accuracy;

logBox.innerHTML += `Epoch ${epoch+1} | loss: ${logs.loss.toFixed(4)} | acc: ${acc.toFixed(4)}<br>`;

logBox.scrollTop = logBox.scrollHeight;

}

}

});

status.innerText = "Training Complete";

};


// Prediction
predictBtn.onclick = ()=>{

const text = input.value;

if(!text){
result.innerText="Enter a sentence";
return;
}

const encoded = encode(text);

const tensor = tf.tensor2d([encoded]);

const prediction = model.predict(tensor);

const value = prediction.dataSync()[0];

if(value > 0.5){

result.innerText = "Positive Sentiment 😊";

result.style.color="green";

}

else{

result.innerText = "Negative Sentiment 😞";

result.style.color="red";

}

};

</script>

</body>
</html>
